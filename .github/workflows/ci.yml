name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest

      - name: Run pytest
        id: pytest
        continue-on-error: true
        run: pytest -v --tb=short

      - name: Show requirement coverage summary
        if: always()
        run: python scripts/summarize_coverage.py

      - name: Upload coverage JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: req-coverage
          path: req_coverage.json
          if-no-files-found: error

      - name: Fail job if any test failed
        if: steps.pytest.outcome == 'failure'
        run: |
          echo "::error::One or more tests failed — see pytest output above."
          echo "Coverage JSON is still published as an artifact."
          exit 1
